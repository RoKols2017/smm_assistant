services:
  postgres:
    networks:
      - internal

  web:
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      TRUST_PROXY_COUNT: ${TRUST_PROXY_COUNT:-1}
      PREFERRED_URL_SCHEME: ${PREFERRED_URL_SCHEME:-https}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_COOKIE_SECURE: ${REMEMBER_COOKIE_SECURE:-true}
    ports: !reset []
    expose:
      - "${PORT:-8000}"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-example.com}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/includes:/etc/nginx/includes:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - public
      - internal

networks:
  public:
  internal:
    internal: true
